services:
  postgres:
    image: postgres:16-alpine
    container_name: infra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INFRA_PG_SUPERUSER:-infra}
      POSTGRES_PASSWORD: ${INFRA_PG_SUPERPASS:-infra_pwd}
      POSTGRES_DB: ${INFRA_PG_DEFAULT_DB:-infra}
    ports:
      - "${INFRA_PG_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - infra_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: infra-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${INFRA_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - infra_net
    profiles: ["redis"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: infra-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${INFRA_MINIO_ROOT_USER:-infra_minio}
      MINIO_ROOT_PASSWORD: ${INFRA_MINIO_ROOT_PASSWORD:-infra_minio_pwd}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${INFRA_MINIO_PORT:-9000}:9000"
      - "${INFRA_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - infra_net
    profiles: ["minio"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  infra_net:
    name: infra_net

volumes:
  pg_data:
  redis_data:
  minio_data:
